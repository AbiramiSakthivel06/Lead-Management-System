{% extends 'leads/auth_base.html' %}
{% block title %}Password Reset Complete | Lead Management System{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="card auth-card text-center">
    <div class="auth-brand">
      <i class="fa-solid fa-chart-line text-primary" style="color: var(--accent-color) !important;"></i> LeadManager
    </div>
    <div class="text-success mb-3"><i class="fa-solid fa-circle-check fa-4x"></i></div>
    <h5 class="fw-bold text-secondary mb-3">Password Changed!</h5>
    <p class="text-muted small mb-4">
      Your password has been reset successfully. You may now log in with your new credentials.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-primary-custom w-100 py-2">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
