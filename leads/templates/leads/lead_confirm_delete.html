{% extends 'leads/base.html' %}
{% block title %}Delete Lead | Lead Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm p-4 text-center" style="border-radius: 16px;">
      <div class="text-danger mb-3"><i class="fa-solid fa-triangle-exclamation fa-4x"></i></div>
      <h3 class="fw-bold">Confirm Deletion</h3>
      <p class="text-muted">
        Are you sure you want to permanently delete the lead for <strong>{{ lead.company_name }}</strong>?
        This action cannot be undone.
      </p>
      
      <form method="POST" class="mt-4">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <a href="{% url 'dashboard' %}" class="btn btn-light px-4">Cancel</a>
          <button type="submit" class="btn btn-danger px-4">
            Delete Lead
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
