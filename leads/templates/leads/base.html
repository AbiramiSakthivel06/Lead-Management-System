{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>{% block title %}Lead Management System{% endblock %}</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

  <!-- Typography & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Local Bootstrap 5 CSS (Supports Offline PWA) -->
  <link rel="stylesheet" href="{% static 'vendor/bootstrap.min.css' %}">
  
  <!-- Custom Core Dashboard Stylesheet -->
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  
  {% block extra_head %}{% endblock %}
</head>
<body>

  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div id="sidebar-wrapper">
      <div class="sidebar-heading d-flex align-items-center gap-2">
        <i class="fa-solid fa-chart-line text-primary-custom" style="color: #3b82f6;"></i>
        <span>LeadManager</span>
      </div>
      <div class="list-group list-group-flush my-3">
        <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
          <i class="fa-solid fa-house"></i> Dashboard
        </a>
        <a href="{% url 'lead_create' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'lead_create' %}active{% endif %}">
          <i class="fa-solid fa-user-plus"></i> Add Lead
        </a>
        <div class="border-top border-secondary my-3 opacity-25"></div>
        <form action="{% url 'logout' %}" method="post" id="logout-form" class="d-none">
          {% csrf_token %}
        </form>
        <a href="#" onclick="event.preventDefault(); localStorage.clear(); sessionStorage.clear(); document.getElementById('logout-form').submit();" class="list-group-item list-group-item-action text-danger mt-auto">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
      <!-- Top Navbar -->
      <nav class="navbar navbar-expand-lg navbar-custom navbar-light">
        <div class="container-fluid">
          <button class="btn btn-outline-secondary d-md-none me-2" id="sidebarToggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h4 class="m-0 fw-bold d-none d-sm-inline-block">Lead Center</h4>
          <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-muted small">
              <i class="fa-solid fa-user-circle me-1 text-primary-custom"></i>
              Welcome, <strong>{{ user.username }}</strong>
            </span>
          </div>
        </div>
      </nav>

      <!-- Main Dashboard Container -->
      <div class="container-fluid p-4">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <!-- Local Bootstrap Bundle JS (Supports Offline PWA) -->
  <script src="{% static 'vendor/bootstrap.bundle.min.js' %}"></script>
  
  <!-- Sidebar Toggle Script -->
  <script>
    const sidebarToggle = document.body.querySelector('#sidebarToggle');
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', event => {
        event.preventDefault();
        document.body.classList.toggle('sb-sidenav-toggled');
        const sidebar = document.getElementById('sidebar-wrapper');
        if (document.body.classList.contains('sb-sidenav-toggled')) {
          sidebar.style.marginLeft = '0';
        } else {
          sidebar.style.marginLeft = '';
        }
      });
    }
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('PWA Service Worker registered with scope: ', registration.scope);
          })
          .catch(error => {
            console.warn('PWA Service Worker registration failed: ', error);
          });
      });
    }
  </script>

  <!-- History Cache Breaker Script (BFcache protection) -->
  <script>
    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            window.location.reload();
        }
    });
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
